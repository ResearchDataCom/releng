name: Build Python code
description: >-
  Builds a Python distribution via GNU Make and uploads the results to a
  [GitHub Actions workflow artifact](https://docs.github.com/en/actions/concepts/workflows-and-actions/workflow-artifacts),
  an immutable archive.  Installs Python.  The makefile targets
  `build-deps`, which runs as the superuser, and `dist` **MUST**
  handle other build dependencies.  Supports
  [matrix strategies](https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations).

inputs:
  artifact-name:
    description: >-
      The name of the immutable archive that will contain the built
      Python distribution.
    required: true
    default: build-artifacts
  python-version:
    description: >-
      The version of Python with which to build distributions.
    required: true
    default: "3.13"
  release:
    description: >-
      The name of a workflow artifact containing the code to be built.
    required: true
    default: release-artifacts
  requirements:
    description: >-
      The name of a workflow artifact containing Python package
      dependency pins.
    default: pip-compile-artifacts

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.release }}
    - if: inputs.requirements
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.requirements }}
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
    - shell: bash
      run: sudo make build-deps
    - shell: bash
      run: make dist
    # The file with the `.does-not-exist` suffix is listed solely to
    # force actions/upload-artifact to preserve the directory
    # structure of the build artifacts.  Developers **MUST NOT**
    # create this file to avoid a false positive if the build fails;
    # cf. https://github.com/actions/upload-artifact/issues/174#issuecomment-2878874192.
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          dist
          96AD5641-7C9D-4E65-81B4-F0889D389D76.does-not-exist
        if-no-files-found: error
