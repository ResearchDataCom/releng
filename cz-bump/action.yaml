name: Release code
description: >-
  Determines the next version number, updates project metadata, and
  tags the new release.  The calling GitHub Actions workflow job
  **MUST** have permission to
  [create or update file contents](https://docs.github.com/en/rest/repos/contents)
  (`contents: write`).

inputs:
  artifact-name:
    description: >-
      The name of the immutable archive that will contain the release.
    required: true
    default: release-artifacts
  changelog-fragment:
    description: >-
      The name of a Markdown document to be created by this workflow
      that will contain release notes for the new version.  Disable by
      setting this to the empty string (`""`).
    required: true
    default: body.md

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - id: cz
      uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # 0.27.1
      with:
        changelog_increment_filename: ${{ inputs.changelog-fragment }}
        github_token: ${{ github.token }}
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.artifact-name }}
        path: .
        if-no-files-found: error

outputs:
  released:
    description: Signals whether this made a release.
    value: ${{ steps.cz.outputs.previous_version != steps.cz.outputs.next_version }}
  tag:
    description: The Git tag corresponding to the release.
    value: v${{ steps.cz.outputs.next_version }}
