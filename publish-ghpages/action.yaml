name: Publish documentation (GitHub Pages)
description: >-
  Retrieves a project's publication-ready documentation from GitHub
  Actions artifact storage and uploads it to project's `gh-pages`
  branch.  The calling GitHub Actions workflow job **MUST** have
  permission to
  [create or update file contents](https://docs.github.com/en/rest/repos/contents)
  (`contents: write`).

inputs:
  artifact-path:
    description: >-
      The artifact path to upload.
    required: true
    default: build/docs

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v8.0.1
      with:
        merge-multiple: true
    - uses: peaceiris/actions-gh-pages@v4.0.0
      with:
        publish_dir: ${{ inputs.artifact-path }}
        github_token: ${{ secrets.GITHUB_TOKEN }}
