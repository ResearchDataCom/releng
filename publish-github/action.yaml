name: Publish release (GitHub)
description: >-
  Retrieves a release's source and binary distributions from GitHub
  Actions artifact storage and uploads them to the
  [project's release page](https://docs.github.com/en/repositories/releasing-projects-on-github).
  The calling GitHub Actions workflow job **MUST** have permission to
  [create or update file contents](https://docs.github.com/en/rest/repos/contents)
  (`contents: write`).

inputs:
  artifact-paths:
    description: >-
      A comma-delimited list of artifact paths to upload; supports
      globbing.
    required: true
  changelog-fragment:
    description: >-
      The name of a Markdown document containing release notes for the
      new version.  Disable by setting this to the empty string
      (`""`).
    required: true
    default: ""
  tag:
    description: The version tag to publish.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        merge-multiple: true
    - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
      with:
        artifacts: ${{ inputs.artifact-paths }}
        bodyFile: ${{ inputs.changelog-fragment }}
        tag: ${{ inputs.tag }}
